kind = "web"
previewPath = "/"
title = "Book Inventory"
version = "1.0.0"
id = "artifacts/book-inventory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25933

[services.development]
run = "pnpm --filter @workspace/book-inventory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/book-inventory", "run", "build" ]
publicDir = "artifacts/book-inventory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25933"
BASE_PATH = "/"
